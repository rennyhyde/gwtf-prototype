<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwimOn</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #00b4d8;
      --text:    #e6edf3;
      --dim:     #8b949e;
      --green:   #3fb950;
      --red:     #f85149;
      --mono:    'Courier New', 'Consolas', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /*
      height:100vh + overflow:hidden locks the page to the viewport.
      This prevents the Chart.js infinite-resize loop that occurs when
      a responsive canvas sits inside a flex child that can grow.
    */
    body {
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.5rem;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 1rem;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.72rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    #status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.4s;
    }
    #status-dot.active { background: var(--green); }

    /* ── Metrics — 4 columns, 2 rows ────────────────────────────────────── */
    #metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }

    .card-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
    }

    .card-value {
      font-family: var(--mono);
      font-size: 1.75rem;
      color: var(--accent);
      line-height: 1;
    }

    .card-unit {
      font-size: 0.6rem;
      color: var(--dim);
    }

    /* ── Controls ────────────────────────────────────────────────────────── */
    #controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-shrink: 0;
    }

    button {
      min-height: 58px;
      min-width: 190px;
      padding: 0 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 0.15s, transform 0.08s;
    }

    button:active  { transform: scale(0.96); }
    button:disabled { opacity: 0.28; cursor: not-allowed; transform: none; }

    #btn-begin { background: var(--green); color: #000; }
    #btn-end   { background: var(--red);   color: #fff; }

    /* ── Chart wrapper ───────────────────────────────────────────────────── */
    /*
      flex:1 + min-height:0 lets this div grow to fill remaining space.
      The inner div is position:relative with height:100% — Chart.js reads
      this height to size the canvas. Without position:relative on the inner
      wrapper the canvas has no stable height anchor and causes infinite resize.
    */
    #chart-outer {
      flex: 1;
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.65rem 0.4rem;
      display: flex;
      flex-direction: column;
    }

    .chart-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-bottom: 0.3rem;
      flex-shrink: 0;
    }

    #chart-inner {
      position: relative;   /* Chart.js anchor — do not remove */
      flex: 1;
      min-height: 0;
    }
  </style>
</head>

<body>

  <header>
    <span class="logo">SWIMON</span>
    <div class="status">
      <span id="status-dot"></span>
      <span id="status-text">Waiting</span>
    </div>
  </header>

  <div id="metrics-grid">
    <!-- Row 1: workout totals -->
    <div class="card">
      <span class="card-label">Time</span>
      <span class="card-value" id="m-time">00:00</span>
      <span class="card-unit">mm:ss</span>
    </div>
    <div class="card">
      <span class="card-label">Distance</span>
      <span class="card-value" id="m-dist">0</span>
      <span class="card-unit">meters</span>
    </div>
    <div class="card">
      <span class="card-label">Calories</span>
      <span class="card-value" id="m-cal">0.0</span>
      <span class="card-unit">kcal</span>
    </div>
    <div class="card">
      <span class="card-label">Strokes</span>
      <span class="card-value" id="m-strokes">0</span>
      <span class="card-unit">total</span>
    </div>

    <!-- Row 2: real-time sensor -->
    <div class="card">
      <span class="card-label">Force</span>
      <span class="card-value" id="m-force">0</span>
      <span class="card-unit">N</span>
    </div>
    <div class="card">
      <span class="card-label">Power</span>
      <span class="card-value" id="m-power">0</span>
      <span class="card-unit">W</span>
    </div>
    <div class="card">
      <span class="card-label">Pull Speed</span>
      <span class="card-value" id="m-speed">0.00</span>
      <span class="card-unit">m/s</span>
    </div>
    <div class="card">
      <span class="card-label">Swim Speed</span>
      <span class="card-value" id="m-swim">0.00</span>
      <span class="card-unit">m/s est.</span>
    </div>
  </div>

  <div id="controls">
    <button id="btn-begin">BEGIN WORKOUT</button>
    <button id="btn-end" disabled>END WORKOUT</button>
  </div>

  <div id="chart-outer">
    <div class="chart-label">Force (N) — last 10 s</div>
    <div id="chart-inner">
      <canvas id="chart-force"></canvas>
    </div>
  </div>

  <script>
    const socket = io();

    const el = {
      time:    document.getElementById('m-time'),
      dist:    document.getElementById('m-dist'),
      cal:     document.getElementById('m-cal'),
      strokes: document.getElementById('m-strokes'),
      force:   document.getElementById('m-force'),
      power:   document.getElementById('m-power'),
      speed:   document.getElementById('m-speed'),
      swim:    document.getElementById('m-swim'),
      dot:     document.getElementById('status-dot'),
      status:  document.getElementById('status-text'),
      begin:   document.getElementById('btn-begin'),
      end:     document.getElementById('btn-end'),
    };

    const chartForce = new Chart(document.getElementById('chart-force'), {
      type: 'line',
      data: {
        datasets: [{
          data: [],
          borderColor: '#00b4d8',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.35,
          fill: true,
          backgroundColor: '#00b4d81a',
        }]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            type: 'linear',
            min: 0, max: 10,
            ticks: { color: '#8b949e', maxTicksLimit: 6,
                     callback: v => v.toFixed(0) + 's' },
            grid: { color: '#30363d' },
          },
          y: {
            min: 0, max: 60,
            ticks: { color: '#8b949e', maxTicksLimit: 5 },
            grid: { color: '#30363d' },
          },
        },
        plugins: { legend: { display: false } },
      },
    });

    function updateChart(chart, pts, nowT) {
      chart.data.datasets[0].data = pts.map(p => ({ x: p.t, y: p.v }));
      chart.options.scales.x.min = Math.max(0, nowT - 10);
      chart.options.scales.x.max = Math.max(10, nowT);
      chart.update('none');
    }

    socket.on('metrics', function(d) {
      el.time.textContent    = d.time_str;
      el.dist.textContent    = d.distance_m.toFixed(0);
      el.cal.textContent     = d.calories.toFixed(1);
      el.strokes.textContent = d.strokes;
      el.force.textContent   = d.force_n.toFixed(0);
      el.power.textContent   = d.power_w.toFixed(0);
      el.speed.textContent   = d.speed_ms.toFixed(2);
      el.swim.textContent    = d.swim_speed_ms.toFixed(2);

      el.dot.classList.toggle('active', d.running);
      el.status.textContent = d.running ? 'Live' : 'Stopped';
      el.begin.disabled = d.running;
      el.end.disabled   = !d.running;

      updateChart(chartForce, d.chart_force, d.elapsed_s);
    });

    el.begin.addEventListener('click', () => socket.emit('begin_workout'));
    el.end.addEventListener  ('click', () => socket.emit('end_workout'));

    socket.on('connect',    () => { el.status.textContent = 'Connected'; });
    socket.on('disconnect', () => {
      el.dot.classList.remove('active');
      el.status.textContent = 'Disconnected';
    });
  </script>
</body>
</html>
